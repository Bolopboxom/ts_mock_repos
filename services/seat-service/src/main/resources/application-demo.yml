server:
  port: 8082

spring:
  datasource:
    url: jdbc:h2:mem:seatdb;DB_CLOSE_DELAY=-1;MODE=Oracle
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    root: INFO
    com.airline: DEBUG
