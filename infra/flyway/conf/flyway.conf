# Flyway configuration for local Oracle migrations
# Adjust values as needed before running.
flyway.url=jdbc:oracle:thin:@oracle:1521/XE
# Use a privileged account that can create users/schemas. Example uses SYS (may require SYSDBA).
# For production, prefer running schema creations separately and let Flyway run per-schema migrations.
flyway.user=SYS
flyway.password=Oracle123
# Comma-separated list of schemas to manage (example)
flyway.schemas=BOOKING_SCHEMA,PAYMENT_SCHEMA,LOYALTY_SCHEMA,NOTIFICATION_SCHEMA,SEAT_SCHEMA
# Where Flyway will find SQL migrations inside the container
flyway.locations=filesystem:/flyway/sql
# Placeholders can be set like flyway.placeholders.foo=bar
