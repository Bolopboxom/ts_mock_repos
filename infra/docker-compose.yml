version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  oracle:
    image: gvenzl/oracle-xe:21-slim
    environment:
      ORACLE_PASSWORD: Oracle123
      ORACLE_ALLOW_REMOTE: "true"
    ports:
      - "1521:1521"
    volumes:
      - ./oracle/init-scripts:/opt/oracle/oradata/scripts/setup:ro
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "tnsping localhost || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 10

  flyway:
    image: flyway/flyway:9.22.0
    depends_on:
      - oracle
    volumes:
      - ./flyway/sql:/flyway/sql:ro
      - ./flyway/conf/flyway.conf:/flyway/conf/flyway.conf:ro
    command: -configFiles=/flyway/conf/flyway.conf migrate

volumes:
  oracle-data:
    driver: local
